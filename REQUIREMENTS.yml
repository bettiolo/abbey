  - id: P3-03
    title: Sanity, dread and the asylum
    phase: phase-3
    description: >
      Per-villager sanity and dread: dark exposure when light fails builds dread ->
      insanity; health resets each morning, sanity does not. An insane unit enters
      asylum cooldown, misses the next night, and is released only by day; with no
      asylum built, insane settlers recover slowly at home but disturb the household
      at night, spreading dread (screaming, crying, sleeplessness, nightmares). Lower
      sanity reduces daytime work efficiency; above the insanity threshold villagers
      stop working until recovered. The beast is immune. AsylumZone (P3-02 shell)
      gains sanity-recovery behaviour, replacing Phase 2 infirmary healing. All
      thresholds/rates in SanityConfig ScriptableObject. Sanity states on debug
      overlay.
