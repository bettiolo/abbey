      even; Dark: friendlies debuffed + sanity drain; the beast is exempt everywhere
      (LightBandCombatResolver, pure/deterministic, unit-testable). Settler tier of
      night defense: settlers shelter in homes and sleep if danger stays away; if
      monsters reach the door, interior lights flare and settlers shoot from lit
