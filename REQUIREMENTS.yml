      (P3-05..P3-08: light-band combat + settler tier, warriors + escalation, hound
      evolution, emergency overdrive); 3C moral consequence (P3-09..P3-11: laws,
      pressures + abbey transformation, consequence nightmares + threat sources);
      3D world + win (P3-12..P3-14: desire paths + ground scars, exploration +
      arrivals + dilemmas, spring-ship win + chapters + end summary). This entry
      stays in_progress until all P3 tasks are merged; GATE-P3 answers the phase
      question afterwards.

