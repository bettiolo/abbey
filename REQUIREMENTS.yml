# REQUIREMENTS.yml — orchestration work tracker (source of truth for who builds what)
#
# RESUME PROTOCOL: if an orchestrator session dies, a new session reads this file and
# resumes. Rules:
#   1. Any task with status in_progress and no merged_commit is presumed lost — reset it
#      to todo (its worktree branch task/<id> may hold partial work; inspect before reuse).
#   2. Tasks with status approved but merged: false must be merged next.
#   3. Never start a task whose depends_on are not all status: merged|done.
#   4. Update this file IMMEDIATELY on every transition and include it in the merge commit.
#
# Status flow: todo -> in_progress -> in_review -> (changes_requested -> in_progress)
#              -> approved -> merged   (docs/config-only tasks may go straight to done)
#
# See docs/ORCHESTRATION.md for the full protocol.

version: 1
project: abbey-at-worlds-end
integration_branch: claude/phase-2-vertical-slice-swr09t # phase-2 session integration branch (2026-07-02); lands on main via PR after GATE-P2. main was the milestone-0/prototype-0.1 integration branch.
branch_convention: task/<id>
worktree_convention: one git worktree per active task, removed after merge

agents:
  orchestrator: top-level session; fires builders + reviewers, merges, updates this file
  builder: subagent in its own worktree; commits to task/<id>; never touches this file
  reviewer: subagent reviewing a task branch diff; verdict approve|changes_requested

