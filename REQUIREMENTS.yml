gates:
  - id: GATE-0.1
    kind: human_review
    question: Is it fun and tense to manage distance from light while directly controlling the Bellkeeper?
    status: approved
    verdict: >
      PASS (2026-07-02). Evidence: all P01 tasks merged; EditMode+PlayMode suites include
      FirstNightTests covering fed-hound-helps and starved-hound-ignores-bell branches;
      scene_proof_day/scene_proof_night renders show the day-charm vs night-fear contrast
      with light reading as territory. User directive of 2026-07-02 (goal: implement
      Phase 2) authorized the orchestrator to issue the verdict and launch Phase 2.
  - id: GATE-P2
    kind: human_review
    question: Does this already feel like the game?
    status: pending
  - id: GATE-P3
    kind: human_review
    question: Does the way you survive visibly change settlement, beast, abbey, nightmares?
    status: pending
