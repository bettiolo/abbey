name: Unity tests

on:
  push:
    paths:
      - "unity/**"
      - "blender/generated/**"
      - ".github/workflows/unity.yml"
  pull_request:
    paths:
      - "unity/**"
      - "blender/generated/**"
      - ".github/workflows/unity.yml"

jobs:
  # Secrets are not exposed to `if:` on forks and we want a visible SKIP rather
  # than a cryptic GameCI activation failure, so probe for the license first.
  license-check:
    runs-on: ubuntu-latest
    outputs:
      has_license: ${{ steps.check.outputs.has_license }}
    steps:
      - name: Check for UNITY_LICENSE secret
        id: check
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "has_license=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_license=false" >> "$GITHUB_OUTPUT"
            echo "::warning::UNITY_LICENSE secret not set - Unity tests skipped." \
                 "Add UNITY_LICENSE (+ UNITY_EMAIL/UNITY_PASSWORD) to run GameCI."
          fi

  test:
    name: Unity ${{ matrix.testMode }} tests
    needs: license-check
    if: needs.license-check.outputs.has_license == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        testMode: [editmode, playmode]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: unity/Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('unity/Packages/**', 'unity/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run ${{ matrix.testMode }} tests (GameCI)
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: unity
          # Unity 6 LTS; game-ci/unity-test-runner@v4 supports 6000.x editor images.
          unityVersion: 6000.0.32f1
          testMode: ${{ matrix.testMode }}
          artifactsPath: test-results-${{ matrix.testMode }}
          checkName: Unity ${{ matrix.testMode }} results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results-${{ matrix.testMode }}
          path: ${{ steps.tests.outputs.artifactsPath }}
          if-no-files-found: warn
          retention-days: 14
